services:

  # 1. Spring Boot Backend
  - type: web
    name: backend-api
    env: docker
    rootDir: back-end
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      # Database connection variables will be provided manually via Render Dashboard
      # DB_URL format: jdbc:mysql://YOUR-EXTERNAL-HOST:3306/email_filter_db?useSSL=true&serverTimezone=UTC
      
      # Allowed Origins for CORS will dynamically read the frontend's address
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: frontend-web
          envVarKey: RENDER_EXTERNAL_URL
          
  # 2. React/Vite Frontend
  - type: web
    name: frontend-web
    env: static
    rootDir: front-end
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: backend-api
          envVarKey: RENDER_EXTERNAL_URL
