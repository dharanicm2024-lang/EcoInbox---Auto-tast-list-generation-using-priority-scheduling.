server:
  port: 8082

spring:
  application:
    name: email-filter

  # --- Database ---
  # Using MySQL (Production)
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:4000/email_filter_db?useSSL=false&serverTimezone=UTC}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Dharan@472006}

  # H2 in-memory (Commented out for MySQL)
  # datasource:
  #   url: jdbc:h2:mem:emailfilterdb
  #   driver-class-name: org.h2.Driver
  #   username: sa
  #   password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        # dialect: org.hibernate.dialect.MySQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

# --- OpenAI ---
openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key-here}
  model: gpt-3.5-turbo
  base-url: https://api.openai.com/v1

# --- Gmail API ---
gmail:
  credentials-file: /credentials.json
  tokens-directory: tokens
  application-name: Email Filter App

# --- Email Fetch Schedule (every 5 minutes) ---
email:
  fetch:
    cron: "0 */5 * * * *"
    max-results: 20

# --- CORS ---
app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:5174}
